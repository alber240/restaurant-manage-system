{% extends 'restaurant/base.html' %}

{% block title %}Guest Checkout{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-md-7 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-user-friends me-2"></i>Guest Checkout</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-2"></i>
                        You're ordering as a guest. No account needed!
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Full Name *</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" name="email" class="form-control" required>
                            <small class="text-muted">We'll send order confirmation here</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Phone Number *</label>
                            <input type="tel" name="phone" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Delivery Address *</label>
                            <textarea name="delivery_address" class="form-control" rows="2" required></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Payment Method</label>
                            <select name="payment_method" class="form-select">
                                <option value="cash">Cash on Delivery</option>
                                <option value="card">Credit/Debit Card</option>
                                <option value="mtn">MTN Mobile Money</option>
                                <option value="airtel">Airtel Money</option>
                            </select>
                        </div>
                        
                        <hr>
                        
                        <div class="alert alert-warning">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="createAccount">
                                <label class="form-check-label" for="createAccount">
                                    <i class="fas fa-user-plus me-1"></i> Create an account for faster future orders
                                </label>
                            </div>
                            <div id="accountFields" style="display: none; margin-top: 15px;">
                                <input type="text" name="new_password" class="form-control mb-2" placeholder="Password">
                                <input type="text" name="confirm_password" class="form-control" placeholder="Confirm Password">
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 py-2">
                            <i class="fas fa-check-circle me-2"></i>Place Order
                        </button>
                        
                        <div class="text-center mt-3">
                            <a href="{% url 'login' %}" class="text-decoration-none">
                                <i class="fas fa-sign-in-alt me-1"></i>Already have an account? Login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('createAccount').addEventListener('change', function() {
        document.getElementById('accountFields').style.display = this.checked ? 'block' : 'none';
    });
</script>
{% endblock %}
