<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Alert</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #dc3545; }
        .alert-header { background: #dc3545; color: white; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="alert-header">
            <h2>{{ alert_type|default:"Staff Alert" }}</h2>
        </div>
        <p>{{ message }}</p>
        {% if details %}
            <ul>
            {% for key, value in details.items %}
                <li><strong>{{ key }}:</strong> {{ value }}</li>
            {% endfor %}
            </ul>
        {% endif %}
        <p>Please take appropriate action.</p>
    </div>
</body>
</html>
